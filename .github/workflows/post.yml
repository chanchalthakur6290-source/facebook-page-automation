```yaml
name: Facebook Auto Post

on:
  schedule:
    - cron: '30 1 * * *'     # 7:00 AM India
    - cron: '30 7 * * *'     # 1:00 PM India
    - cron: '30 13 * * *'    # 7:00 PM India

  workflow_dispatch:

jobs:

  post:

    runs-on: ubuntu-latest

    env:
      GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
      FACEBOOK_TOKEN: ${{ secrets.FACEBOOK_TOKEN }}
      PAGE_ID: ${{ secrets.PAGE_ID }}

    steps:

      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Dependencies
        run: |
          pip install requests
          pip install python-dotenv
          pip install pillow
          pip install google-genai

      - name: Run Automation
        run: |
          python main.py

      - name: Commit Updated Files
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "github-actions@github.com"

          git add posted_images.txt

          git diff --staged --quiet || git commit -m "Update posted images"

          git push
```
